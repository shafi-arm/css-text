<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shadows</title>
    <style>
        #text{
            text-shadow: 2px 2px 5px red;
        }
        #box{
            box-shadow: 2px 2px 5px lightgreen;
        }
        #indent{
            text-indent: 50%;
        }
    </style>
</head>
<body>
    <h1 id="text">We can create text shadows</h1>
    <h1 id="box">We can create box shadows</h1>

    <div>
        <p>text indent</p>
        <p id="indent">"I am Batman"</p>
    </div>
    
</body>
</html>

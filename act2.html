<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform</title>
    <style>
        div{
            width: 600px;
            height: 200px;
            background-color: darkorange;
            border: 2px solid;
            padding: 16px;
        }
        
        #mirror{
            transform: rotateX(180deg);
        }


    </style>
</head>
<body>
    <h1>Transform</h1>

    <div>We are learning css</div>
     <div id="mirror">We are learning css</div>


</body>
</html>
